name: Deploy Backend → Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/andre-rfreitas/sistema-traction-api:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Test
        run: dotnet test backend/tests/Application.Tests/SistemaTraction.Application.Tests.csproj --configuration Release --verbosity normal

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          az extension add --name containerapp --upgrade --only-show-errors
          az containerapp registry set \
            --name sistema-traction-api \
            --resource-group rg-sistema-traction \
            --server ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GHCR_READ_TOKEN }} \
            --output none
          az containerapp update \
            --name sistema-traction-api \
            --resource-group rg-sistema-traction \
            --image ${{ env.IMAGE }} \
            --output none
